# APP PREAMBLE
AppBaseName = DataOrganizer
AppFriendlyName = Data Organizer
AppId = com.alexeyfala.dataorganizer
# Fallback only - overridden at build time via --app-version, read from <AppVersion> in Directory.Build.props.
AppVersionRelease = 0.0.1[1]
AppShortSummary = Keep encrypted notes and snippets and copy them anywhere via global hotkeys
AppDescription = """
    Data Organizer is a cross-platform desktop app for keeping notes, credentials, snippets and structured records in one place - and pasting them anywhere via global hotkeys. Bind any file's contents to a keyboard shortcut and copy it to the clipboard instantly, even while the app runs in the background; perfect for templates, boilerplate and any text you reuse often.

    Everything lives in a local SQLite virtual file system of files, folders and key-value datasets, with sensitive folders protected by password-based XChaCha20-Poly1305 encryption. A built-in clipboard history captures text, images and files, alongside favorites for quick access, import and export via JSON, XML or the whole database, light and dark Material themes, and English or Russian localization.
"""
