# APP PREAMBLE
AppBaseName = DataOrganizer
AppFriendlyName = Data Organizer
AppId = com.alexeyfala.dataorganizer
# Fallback only - overridden at build time via --app-version, read from <AppVersion> in Directory.Build.props.
AppVersionRelease = 0.0.1[1]
AppShortSummary = Storing data in one place as a virtual file system
AppDescription = """
    Data Organizer is a cross-platform desktop app for keeping notes, snippets and structured records in one place - and copying their text to the clipboard via global hotkeys.
"""
AppLicenseId = Apache-2.0
AppLicenseFile = LICENSE
AppChangeFile = 

# PUBLISHER
PublisherName = Alexey Fala
PublisherId = com.alexeyfala
PublisherCopyright = Copyright (C) Alexey Fala 2026
PublisherLinkName = Source Code
PublisherLinkUrl = https://github.com/alexeyfala/DataOrganizer
PublisherEmail = alexeyfala@gmail.com
PublisherGpgKeyId =

# DESKTOP INTEGRATION
DesktopNoDisplay = false
DesktopTerminal = false
DesktopFile =
StartCommand =
PrimeCategory = Utility
MetaFile = app.metainfo.xml
# SVG is the scalable icon for deb/rpm/flatpak; the 256px PNG is a raster fallback (e.g. AppImage root icon).
IconFiles = """
    DataOrganizer/Assets/Logo.svg
    DataOrganizer/Assets/Logo.256.png
"""

# DOTNET PUBLISH
DotnetProjectPath = DataOrganizer.Desktop
DotnetPublishArgs = -p:Version=${APP_VERSION} --self-contained true -p:DebugType=None -p:DebugSymbols=false
DotnetPostPublish = 
DotnetPostPublishOnWindows = 

# PACKAGE OUTPUT
PackageName = DataOrganizer
OutputDirectory = Publish

# APPIMAGE OPTIONS
AppImageArgs = --no-appstream
AppImageRuntimePath =
AppImageVersionOutput = true

# FLATPAK OPTIONS
FlatpakPlatformRuntime = org.freedesktop.Platform
FlatpakPlatformSdk = org.freedesktop.Sdk
FlatpakPlatformVersion = 25.08
FlatpakFinishArgs = """
    --socket=x11
"""
FlatpakBuilderArgs = 

# RPM OPTIONS
RpmAutoReq = false
RpmAutoProv = true
RpmRequires = """
    glibc
    libgcc
    ca-certificates
    openssl-libs
    libstdc++
    libicu
    tzdata
    krb5-libs
"""

# DEBIAN OPTIONS
DebianRecommends = """
    libc6
    libgcc-s1
    libgssapi-krb5-2
    libicu72
    libssl3
    libstdc++6
    zlib1g
"""

# WINDOWS SETUP OPTIONS
SetupGroupName = 
SetupAdminInstall = false
SetupCommandPrompt = 
