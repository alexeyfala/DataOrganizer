name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Build desktop app
        run: dotnet build DataOrganizer.Desktop/DataOrganizer.Desktop.csproj --configuration Release

      - name: Test DataOrganizer.UnitTests
        run: dotnet test DataOrganizer.UnitTests/DataOrganizer.UnitTests.csproj --configuration Release

      - name: Test Repository.UnitTests
        run: dotnet test Repository.UnitTests/Repository.UnitTests.csproj --configuration Release

      - name: Test Shared.UnitTests
        run: dotnet test Shared.UnitTests/Shared.UnitTests.csproj --configuration Release
